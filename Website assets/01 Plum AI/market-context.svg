<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" font-family="Plus Jakarta Sans, -apple-system, sans-serif">
  <!-- Background card -->
  <rect width="1200" height="280" rx="12" fill="#F2F0F5"/>

  <!-- Label -->
  <text x="40" y="44" font-size="12" font-weight="700" fill="#1a1a1a" letter-spacing="0">MARKET CONTEXT</text>

  <!-- Three stat columns -->
  <!-- Stat 1: 13M -->
  <g transform="translate(40, 80)">
    <text x="0" y="0" font-size="64" font-weight="800" fill="#1a1a1a" letter-spacing="-2.5">13M</text>
    <text x="0" y="32" font-size="14" font-weight="500" fill="#4a5568">UK adults holding</text>
    <text x="0" y="52" font-size="14" font-weight="500" fill="#4a5568">cash they could invest</text>
  </g>

  <!-- Divider -->
  <line x1="380" y1="80" x2="380" y2="220" stroke="#D1CCDB" stroke-width="1"/>

  <!-- Stat 2: £430B -->
  <g transform="translate(420, 80)">
    <text x="0" y="0" font-size="64" font-weight="800" fill="#9B8FFF" letter-spacing="-2.5">£430B</text>
    <text x="0" y="32" font-size="14" font-weight="500" fill="#4a5568">sitting in low-return</text>
    <text x="0" y="52" font-size="14" font-weight="500" fill="#4a5568">cash savings accounts</text>
  </g>

  <!-- Divider -->
  <line x1="820" y1="80" x2="820" y2="220" stroke="#D1CCDB" stroke-width="1"/>

  <!-- Stat 3: 70% -->
  <g transform="translate(860, 80)">
    <text x="0" y="0" font-size="64" font-weight="800" fill="#1a1a1a" letter-spacing="-2.5">70%</text>
    <text x="0" y="32" font-size="14" font-weight="500" fill="#4a5568">cite "lack of knowledge"</text>
    <text x="0" y="52" font-size="14" font-weight="500" fill="#4a5568">as reason they don't invest</text>
  </g>

  <!-- Source line -->
  <text x="40" y="250" font-size="11" font-weight="400" fill="#6b7280" font-style="italic">
    Sources: Barclays (2024) · Social Market Foundation (2024) · FCA Cash Savings Review (2023)
  </text>
</svg>
